<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpg" href="logo-rts.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>RTS — Acesso</title>

    <!-- TV MODE: ?tv=1 na URL ativa zoom para TV 50" Full HD -->
    <script>
      (function(){
        var p = new URLSearchParams(window.location.search);
        var z = p.get('tv');
        if (z === '1' || z === 'true') {
          document.documentElement.style.zoom = '1.4';
        } else if (z) {
          var n = parseFloat(z);
          if (n > 0 && n < 5) document.documentElement.style.zoom = String(n);
        }
      })();
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg-base:      #0a0a0a;
        --bg-card:      #1a1a1a;
        --bg-surface:   #161616;
        --border:       #262626;
        --border-focus: #F0AB00;
        --gold:         #F0AB00;
        --gold-dark:    #c48d00;
        --text:         #f5f5f5;
        --text-muted:   #525252;
        --red:          #ef4444;
        --font: 'Inter', sans-serif;
      }

      body {
        background-color: var(--bg-base);
        font-family: var(--font);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      /* Gradiente de fundo sutil */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse at 20% 50%, rgba(240,171,0,0.06) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, rgba(120,212,201,0.04) 0%, transparent 50%);
        pointer-events: none;
      }

      /* ── Card de Login ─────────────────────────────── */
      .login-card {
        position: relative;
        z-index: 1;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 44px 40px 36px;
        width: 100%;
        max-width: 400px;
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.03),
          0 24px 64px rgba(0,0,0,0.6);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }

      /* ── Logo + branding ───────────────────────────── */
      .login-logo {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 8px;
      }

      .login-logo img {
        width: 44px;
        height: 44px;
        object-fit: contain;
        border-radius: 8px;
      }

      .login-brand {
        display: flex;
        flex-direction: column;
      }

      .login-brand-name {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--gold);
        letter-spacing: 0.08em;
        line-height: 1;
      }

      .login-brand-sub {
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-top: 2px;
      }

      .login-divider {
        width: 100%;
        height: 1px;
        background: var(--border);
        margin: 22px 0 26px;
      }

      .login-subtitle {
        font-size: 0.78rem;
        color: var(--text-muted);
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 500;
        margin-bottom: 24px;
        margin-top: -10px;
      }

      /* ── Formulário ────────────────────────────────── */
      .login-form {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .form-group label {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .form-group input {
        width: 100%;
        padding: 11px 14px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--font);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .form-group input:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px rgba(240,171,0,0.15);
      }

      .form-group input::placeholder {
        color: #3a3a3a;
      }

      /* ── Mensagem de erro ──────────────────────────── */
      .login-error {
        display: none;
        align-items: center;
        gap: 8px;
        background: rgba(239,68,68,0.12);
        border: 1px solid rgba(239,68,68,0.35);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.82rem;
        color: #fca5a5;
        font-weight: 500;
        margin-top: -4px;
      }

      .login-error.visible { display: flex; }

      /* ── Botão Entrar ──────────────────────────────── */
      .btn-login {
        width: 100%;
        padding: 12px;
        margin-top: 4px;
        background: var(--gold);
        color: #111;
        border: none;
        border-radius: 8px;
        font-family: var(--font);
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: background 0.2s, transform 0.15s;
      }

      .btn-login:hover:not(:disabled) {
        background: var(--gold-dark);
        transform: translateY(-1px);
      }

      .btn-login:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* ── Rodapé do card ────────────────────────────── */
      .login-footer {
        margin-top: 28px;
        font-size: 0.72rem;
        color: var(--text-muted);
        text-align: center;
        line-height: 1.5;
      }

      /* ── Spinner ───────────────────────────────────── */
      .spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(17,17,17,0.3);
        border-top-color: #111;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <img src="logo-rts.png" alt="RTS" />
        <div class="login-brand">
          <span class="login-brand-name">RTS</span>
          <span class="login-brand-sub">Real Time Support</span>
        </div>
      </div>

      <div class="login-divider"></div>

      <p class="login-subtitle">Acesso ao Sistema</p>

      <!-- Formulário -->
      <form class="login-form" onsubmit="submitLogin(event)">

        <div class="form-group">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            name="email"
            placeholder="seu@venezanet.com"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="login-senha">Senha</label>
          <input
            type="password"
            id="login-senha"
            name="senha"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <!-- Mensagem de erro -->
        <div class="login-error" id="login-error-msg">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="login-error-text">Email ou senha incorretos.</span>
        </div>

        <button type="submit" class="btn-login" id="btn-entrar">
          Entrar
        </button>

      </form>

      <!-- Rodapé -->
      <div class="login-footer">
        Veneza Equipamentos &mdash; Centro de Soluções Conectadas
      </div>

    </div>

    <script>
      async function submitLogin(e) {
        e.preventDefault();

        const email  = document.getElementById('login-email').value.trim();
        const senha  = document.getElementById('login-senha').value;
        const btn    = document.getElementById('btn-entrar');
        const errBox = document.getElementById('login-error-msg');
        const errTxt = document.getElementById('login-error-text');

        // Oculta erro anterior
        errBox.classList.remove('visible');

        // Estado de loading
        btn.disabled = true;
        btn.textContent = '';
        const spinner = document.createElement('div');
        spinner.className = 'spinner';
        spinner.style.display = 'block';
        btn.appendChild(spinner);

        try {
          const resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, senha }),
          });

          const json = await resp.json();

          if (json.success) {
            // Verifica se há redirect (ex: vindo do RTA)
            const params = new URLSearchParams(window.location.search);
            const redirectTo = params.get('redirect');
            window.location.href = redirectTo || '/';
          } else {
            errTxt.textContent = json.error || 'Email ou senha incorretos.';
            errBox.classList.add('visible');
          }
        } catch (_) {
          errTxt.textContent = 'Erro de conexão com o servidor.';
          errBox.classList.add('visible');
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Entrar';
        }
      }
    </script>
  </body>
</html>
