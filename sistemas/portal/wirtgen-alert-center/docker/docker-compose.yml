# =========== Wirtgen Alert Center — WAC ============
# docker-compose.yml — 2 servicos: Backend + Frontend
# ====================================================
#
# Diferenca vs CSC/DFA/PSI: NAO sobe container de banco.
# Conecta direto no PostgreSQL de PRODUCAO csc_veneza (192.168.0.106:5432)
# reutilizando as credenciais DB_* ja definidas em C:\env\.env.
#
# Execucao (na VM):
#   cd portal/wirtgen-alert-center/docker
#   docker compose --env-file C:/env/.env up -d --build
#   docker compose logs -f
#   docker compose down
#
# Portas padrao:
#   - Backend API:  4016
#   - Frontend:     4017 (host)

name: wirtgen-alert-center

services:

  wac-backend:
    image: wac-backend:latest
    container_name: wac-backend
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    environment:
      # Mapeia DB_* (centralizado no .env) para PG* que o db.js espera.
      PGHOST:     "${DB_HOST}"
      PGPORT:     "${DB_PORT}"
      PGDATABASE: "${DB_NAME}"
      PGUSER:     "${DB_USER}"
      PGPASSWORD: "${DB_PASSWORD}"
      PGPOOL_MAX:            "${WAC_PGPOOL_MAX:-10}"
      PG_STATEMENT_TIMEOUT:  "${WAC_PG_STATEMENT_TIMEOUT:-120000}"
      WAC_BACKEND_PORT: "4016"
      TZ: "America/Recife"
    ports:
      - "${WAC_BACKEND_PORT:-4016}:4016"
    extra_hosts:
      # Permite ao container alcancar o PostgreSQL csc_veneza no host da VM.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4016/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wac-net
    volumes:
      - ../backend/server.js:/app/server.js:ro
      - ../backend/db.js:/app/db.js:ro
      - ../backend/queries.js:/app/queries.js:ro

  wac-frontend:
    image: wac-frontend:latest
    container_name: wac-frontend
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    environment:
      WAC_FRONTEND_PORT: "4017"
      WAC_BACKEND_URL:   "http://wac-backend:4016"
      TZ: "America/Recife"
    ports:
      - "${WAC_FRONTEND_PORT:-4017}:4017"
    depends_on:
      wac-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4017/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wac-net
    volumes:
      - ../frontend/server.js:/app/server.js:ro
      - ../frontend/index.html:/app/index.html:ro
      - ../frontend/data-source.js:/app/data-source.js:ro
      - ../frontend/assets:/app/assets:ro

networks:
  wac-net:
    driver: bridge
