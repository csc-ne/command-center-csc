# =========== RTA - REAL TIME ALERT ============
# docker-compose.yml — container do RTA (separado do RTS)
# ================================================
#
# Execucao:
#   cd rta/docker
#   docker compose --env-file C:/env/.env -f docker-compose.yml up -d
#
# .env centralizado em C:\env\.env (Windows Server VM).
#   docker compose -f docker-compose.yml logs -f rta
#   docker compose -f docker-compose.yml down
#
# O RTA roda na porta 3021 por padrao (configuravel via RTA_PORT no .env).
# Ele consulta o PostgreSQL (csc_veneza) em 192.168.0.106.
# Nao compartilha rede nem volumes com o RTS.

name: rta

services:

  rta:
    image: rta-dashboard:latest
    container_name: rta-dashboard
    build:
      context: ..
      dockerfile: docker/Dockerfile.rta
    restart: unless-stopped
    env_file:
      - C:/env/.env
    environment:
      TZ: "America/Recife"
      NODE_ENV: "production"
    ports:
      - "${RTA_PORT:-3021}:3021"
    volumes:
      # Bind-mount dos arquivos para desenvolvimento rapido (sem rebuild)
      - ../backend/server.js:/app/backend/server.js:ro
      - ../backend/db.js:/app/backend/db.js:ro
      - ../backend/queries.js:/app/backend/queries.js:ro
      - ../frontend:/app/frontend:ro
      # C:\env\.env (host) montado em /app/.env dentro do container.
      # server.js faz dotenv.config({ path: path.join(__dirname, "..", ".env") }),
      # que dentro do container resolve para /app/.env.
      - C:/env/.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3021/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rta-net

networks:
  rta-net:
    driver: bridge
